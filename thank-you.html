<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You — British Heritage Hosts</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Jost', sans-serif;
  background: #0D1B2A;
  color: #F5F0E8;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem;
}
.card {
  max-width: 560px;
  padding: 3rem 2rem;
}
.eyebrow {
  font-size: 1rem;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #C9A84C;
  display: block;
  margin-bottom: 1.2rem;
}
h1 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: 2.4rem;
  line-height: 1.2;
  margin-bottom: 1.5rem;
  color: #F5F0E8;
}
.gold-line {
  width: 60px;
  height: 1px;
  background: #C9A84C;
  margin: 0 auto 1.5rem;
}
p {
  font-size: 1rem;
  font-weight: 300;
  line-height: 1.8;
  color: rgba(245,240,232,0.7);
  margin-bottom: 2.5rem;
}
.btn {
  display: inline-block;
  padding: 1rem 2.5rem;
  font-family: 'Jost', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  text-decoration: none;
  background: #C9A84C;
  color: #0D1B2A;
  border: none;
  cursor: pointer;
  transition: background 0.3s;
}
.btn:hover { background: #E8C97A; }
</style>
</head>
<body>
<div class="card">
  <span class="eyebrow">Thank You</span>
  <h1>We have received your enquiry</h1>
  <div class="gold-line"></div>
  <p>A member of our team will be in touch shortly. We look forward to creating an exceptional experience for you.</p>
  <a href="/" class="btn">Return to Home</a>
</div>
</body>
</html>
